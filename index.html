<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Commuter - Apalit</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; }

        .ui-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; z-index: 10;
        }
        
        .glass-card { 
            background: rgba(28, 28, 30, 0.85); backdrop-filter: saturate(180%) blur(20px);
            padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .role-box { display: flex; gap: 6px; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 9px; cursor: pointer; font-weight: 600; background: transparent; color: #8e8e93; font-size: 13px; }
        .tab.active { background: #007aff; color: white; }

        input, select { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            background: rgba(255,255,255,0.05); color: white; margin-bottom: 10px; font-size: 16px;
        }

        .main-btn { 
            width: 100%; padding: 16px; border: none; border-radius: 14px; 
            color: white; font-weight: 700; font-size: 16px; cursor: pointer;
            background: #007aff; margin-bottom: 8px;
        }

        .sos-btn {
            width: 100%; padding: 12px; background: rgba(255, 59, 48, 0.2); border: 1px solid rgba(255, 59, 48, 0.5);
            border-radius: 12px; color: #ff3b30; font-weight: 700; cursor: pointer; font-size: 13px;
        }

        #info-panel { display: none; }
        .eta { font-size: 32px; font-weight: 800; color: #007aff; margin: 2px 0; letter-spacing: -1px; }
        .badge { display: inline-block; padding: 4px 10px; background: rgba(0, 122, 255, 0.15); color: #007aff; border-radius: 6px; font-size: 10px; font-weight: bold; margin-bottom: 6px; }
        
        .marker-icon {
            width: 50px; height: 50px; background-size: contain; background-repeat: no-repeat;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-container">
    <div class="glass-card">
        <div id="setup-panel">
            <div class="role-box">
                <button class="tab active" onclick="setRole('driver')">DRIVER</button>
                <button class="tab" onclick="setRole('passenger')">PASSENGER</button>
            </div>

            <div id="driver-ui">
                <input type="text" id="driverName" placeholder="Driver Name (e.g. Kuya Cardo)">
                <select id="vehicle">
                    <option value="tricycle">🛺 Tricycle</option>
                    <option value="jeep">🚍 Modern Jeep</option>
                    <option value="bus">🚌 Bus</option>
                </select>
                <button class="main-btn" onclick="startApp()">START DRIVING</button>
            </div>

            <div id="passenger-ui" style="display:none;">
                <p style="font-size: 13px; color: #8e8e93; margin-bottom: 15px;">Tracking live vehicles in Apalit...</p>
                <button class="main-btn" onclick="startApp()">TRACK NEARBY</button>
            </div>
            <button class="sos-btn" onclick="alert('SOS SENT!')">EMERGENCY SOS</button>
        </div>

        <div id="info-panel">
            <div class="badge">LIVE TRACKING</div>
            <div id="display-name" style="font-weight: 700; font-size: 18px;">---</div>
            <div id="display-type" style="font-size: 11px; color: #8e8e93;">VEHICLE</div>
            <div class="eta" id="display-eta">-- MIN</div>
            <button class="sos-btn" style="margin-top:10px;" onclick="alert('SOS SENT!')">REPORT ACCIDENT / SOS</button>
        </div>
    </div>
</div>

<script>
    // --- SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyDAF957yq7BpNDOzQJpCqDkL-fhgBMywiY",
        databaseURL: "https://jeepney-tracker-33edd-default-rtdb.firebaseio.com",
        projectId: "jeepney-tracker-33edd",
        appId: "1:520991616016:web:475faf5308dc78ca5af53b" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // !!! REPLACE THIS WITH YOUR KEY !!!
    mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/navigation-night-v1', 
        center: [120.7570, 14.9455],
        zoom: 16,
        pitch: 65
    });

    let role = 'driver';
    let el = document.createElement('div');
    el.className = 'marker-icon';
    let marker = new mapboxgl.Marker(el);

    const vehicleIcons = {
        tricycle: 'https://cdn-icons-png.flaticon.com/512/2898/2898516.png',
        jeep: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
        bus: 'https://cdn-icons-png.flaticon.com/512/1039/1039845.png'
    };

    function setRole(r) {
        role = r;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('driver-ui').style.display = r === 'driver' ? 'block' : 'none';
        document.getElementById('passenger-ui').style.display = r === 'passenger' ? 'block' : 'none';
    }

    function startApp() {
        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('info-panel').style.display = 'block';

        if (role === 'driver') {
            const name = document.getElementById('driverName').value || "Express";
            const vType = document.getElementById('vehicle').value;
            
            navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, heading } = pos.coords;
                db.ref('shared_location/v1').set({ name, type: vType, lat: latitude, lng: longitude, heading: heading || 0 });
                updateMap(name, vType, latitude, longitude, heading);
            }, null, { enableHighAccuracy: true });
        } else {
            db.ref('shared_location/v1').on('value', (snap) => {
                const data = snap.val();
                if (data) updateMap(data.name, data.type, data.lat, data.lng, data.heading);
            });
        }
    }

    function updateMap(name, type, lat, lng, heading) {
        el.style.backgroundImage = `url(${vehicleIcons[type]})`;
        marker.setLngLat([lng, lat]).addTo(map);
        map.easeTo({ center: [lng, lat], bearing: heading || 0, duration: 1000 });
        
        document.getElementById('display-name').innerText = name;
        document.getElementById('display-type').innerText = type.toUpperCase();
        document.getElementById('display-eta').innerText = "3 MIN"; // Example
    }

    map.on('load', () => {
        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite', 'source-layer': 'building',
            'type': 'fill-extrusion',
            'paint': {
                'fill-extrusion-color': '#242f3e',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-opacity': 0.6
            }
        });
    });
</script>
</body>
</html>
