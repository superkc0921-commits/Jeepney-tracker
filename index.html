<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CL Live - Map Fix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f7f6; overflow: hidden; height: 100vh; }
        
        /* Bright Map for Visibility */
        #map { height: 60vh; width: 100%; background: #e0e0e0; z-index: 1; border-bottom: 2px solid #ddd; }

        .app-container { padding: 15px; max-width: 500px; margin: auto; position: relative; z-index: 100; }
        .card { 
            background: white; padding: 22px; border-radius: 28px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.12); margin-top: -60px; position: relative;
        }

        .role-selector { display: flex; gap: 8px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 15px; }
        .role-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; background: transparent; color: #777; transition: 0.2s; }
        .role-btn.active { background: #007aff; color: white; box-shadow: 0 4px 10px rgba(0,122,255,0.2); }

        input, select { width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 12px; background: #fafafa; font-size: 15px; margin-bottom: 12px; color: #333; }

        .action-btn { 
            width: 100%; padding: 18px; border: none; border-radius: 15px; 
            color: white; font-weight: 800; font-size: 16px; cursor: pointer;
            background: linear-gradient(135deg, #007aff, #005bb5);
        }

        /* Fixed Bubble Markers */
        .bubble-container { width: 60px; height: 70px; display: flex; flex-direction: column; align-items: center; }
        .bubble-main { 
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff; 
            background: white; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }
        .bubble-arrow { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid #fff; margin-top: -2px; }
        
        .driver-bubble .bubble-main { border-color: #28a745; } 
        .driver-bubble .bubble-arrow { border-top-color: #28a745; }
        .passenger-bubble .bubble-main { border-color: #007aff; } 
        .passenger-bubble .bubble-arrow { border-top-color: #007aff; }
        .bubble-img { width: 80%; height: 80%; object-fit: contain; }

        #info-display { display: none; text-align: center; }
        .stats-row { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .stat-value { font-size: 28px; font-weight: 900; color: #007aff; display: block; }
        .stat-label { font-size: 10px; color: #999; text-transform: uppercase; font-weight: bold; }
        .ai-tag { font-size: 9px; background: #e1f0ff; color: #007aff; padding: 2px 5px; border-radius: 4px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="app-container">
    <div class="card">
        <div id="setup-ui">
            <div class="role-selector">
                <button id="btn-driver" class="role-btn active" onclick="setRole('driver')">DRIVER</button>
                <button id="btn-passenger" class="role-btn" onclick="setRole('passenger')">PASSENGER</button>
            </div>
            <div id="driver-form">
                <input type="text" id="userName" placeholder="Enter Driver Name">
                <select id="destination">
                    <option value="" disabled selected>Choose Destination</option>
                    <option value="Apalit">Apalit Public Market</option>
                    <option value="SanFernando">SM City Pampanga</option>
                    <option value="Angeles">Marquee Mall</option>
                    <option value="Malolos">Malolos Cathedral</option>
                </select>
                <select id="vehicle">
                    <option value="jeep">🚍 Modern Jeepney</option>
                    <option value="bus">🚌 Provincial Bus</option>
                </select>
                <button class="action-btn" onclick="startSharing()">START LIVE FEED</button>
            </div>
            <div id="passenger-form" style="display:none;">
                <input type="text" id="passName" placeholder="Enter Passenger Name">
                <button class="action-btn" onclick="startSharing()">FIND NEARBY VEHICLES</button>
            </div>
        </div>

        <div id="info-display">
            <h3 id="display-name" style="margin:0; font-size: 18px; color: #333;">---</h3>
            <p id="dest-display" style="font-size: 11px; color: #28a745; font-weight: bold; margin: 5px 0;">READY</p>
            
            <div class="stats-row">
                <div style="flex:1">
                    <span id="display-speed" class="stat-value">0</span>
                    <span class="stat-label">KM/H SPEED</span>
                </div>
                <div style="flex:1">
                    <span id="display-eta" class="stat-value">--</span>
                    <span class="stat-label">MINS ETA <span class="ai-tag">AI</span></span>
                </div>
            </div>
            
            <button class="action-btn" style="background:#f2f2f7; color:#444; font-size:12px; padding:10px; margin-top:20px;" onclick="stopSharing()">STOP & RESET</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAF957yq7BpNDOzQJpCqDkL-fhgBMywiY",
        databaseURL: "https://jeepney-tracker-33edd-default-rtdb.firebaseio.com",
        projectId: "jeepney-tracker-33edd",
        appId: "1:520991616016:web:475faf5308dc78ca5af53b" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const destinations = { "Apalit": [14.9455, 120.7570], "SanFernando": [15.0514, 120.6974], "Angeles": [15.1450, 120.6156], "Malolos": [14.8510, 120.8161] };
    const icons = { jeep: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png', bus: 'https://cdn-icons-png.flaticon.com/512/1039/1039845.png', user: 'https://cdn-icons-png.flaticon.com/512/1144/1144760.png' };

    // Standard Map Setup
    var map = L.map('map', { zoomControl: false }).setView([14.9455, 120.7570], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let role = 'driver', markers = {}, watchId = null, myName = "", lastPos = null;

    function setRole(r) {
        role = r;
        document.getElementById('btn-driver').classList.toggle('active', r === 'driver');
        document.getElementById('btn-passenger').classList.toggle('active', r === 'passenger');
        document.getElementById('driver-form').style.display = r === 'driver' ? 'block' : 'none';
        document.getElementById('passenger-form').style.display = r === 'passenger' ? 'block' : 'none';
    }

    // Advanced Speed Calculation for Mobile Hardware
    function getLiveSpeed(newLat, newLng, hardwareSpeed) {
        if (hardwareSpeed && hardwareSpeed > 0) return Math.round(hardwareSpeed * 3.6);
        if (!lastPos) { lastPos = { lat: newLat, lng: newLng, time: Date.now() }; return 0; }
        
        const dist = map.distance([lastPos.lat, lastPos.lng], [newLat, newLng]);
        const timeDiff = (Date.now() - lastPos.time) / 1000;
        
        if (timeDiff < 1 || dist < 2) return 0; // Filter jitter
        
        const calculatedKmh = Math.round((dist / timeDiff) * 3.6);
        lastPos = { lat: newLat, lng: newLng, time: Date.now() };
        return Math.min(calculatedKmh, 100); 
    }

    function startSharing() {
        const input = role === 'driver' ? 'userName' : 'passName';
        myName = document.getElementById(input).value || "User_" + Math.floor(Math.random()*99);
        
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('info-display').style.display = 'block';
        
        // Final map render fix
        setTimeout(() => map.invalidateSize(), 300);

        watchId = navigator.geolocation.watchPosition((pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const speed = getLiveSpeed(lat, lng, pos.coords.speed);
            const destKey = document.getElementById('destination').value;

            db.ref('cl_live/' + myName).set({
                name: myName, role, lat, lng, speed, 
                vehicle: role === 'driver' ? document.getElementById('vehicle').value : 'user',
                dest: (role === 'driver' && destKey) ? destKey : null
            });
        }, (err) => alert("Please Enable GPS Location"), { enableHighAccuracy: true, maximumAge: 0 });

        db.ref('cl_live').on('value', (snap) => {
            const data = snap.val();
            for (let id in markers) { if (!data || !data[id]) { map.removeLayer(markers[id]); delete markers[id]; } }
            for (let id in data) updateMarker(data[id]);
        });
    }

    function updateMarker(u) {
        const isDriver = u.role === 'driver';
        const bubbleClass = isDriver ? 'driver-bubble' : 'passenger-bubble';
        const iconImg = icons[u.vehicle] || icons.user;
        const html = `<div class="bubble-container ${bubbleClass}"><div class="bubble-main"><img src="${iconImg}" class="bubble-img"></div><div class="bubble-arrow"></div></div>`;

        if (!markers[u.name]) {
            markers[u.name] = L.marker([u.lat, u.lng], { icon: L.divIcon({ className: '', html, iconSize: [60, 70], iconAnchor: [30, 70] }) }).addTo(map);
        } else {
            markers[u.name].setLatLng([u.lat, u.lng]);
        }

        if (u.name === myName) {
            map.panTo([u.lat, u.lng]);
            document.getElementById('display-name').innerText = u.name;
            document.getElementById('display-speed').innerText = u.speed;
            
            if (u.dest && destinations[u.dest]) {
                const distanceKm = map.distance([u.lat, u.lng], destinations[u.dest]) / 1000;
                // AI ETA Logic: 25km/h for city, 45km/h for highway average
                const aiSpeed = distanceKm < 3 ? 25 : 45;
                document.getElementById('display-eta').innerText = Math.max(1, Math.round((distanceKm / aiSpeed) * 60));
                document.getElementById('dest-display').innerText = "DESTINATION: " + u.dest.toUpperCase();
            } else {
                document.getElementById('display-eta').innerText = "--";
                document.getElementById('dest-display').innerText = isDriver ? "NO DESTINATION SET" : "LOOKING FOR RIDE";
            }
        }
    }

    function stopSharing() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (myName) db.ref('cl_live/' + myName).remove();
        db.ref('cl_live').off();
        for (let id in markers) { map.removeLayer(markers[id]); }
        markers = {};
        document.getElementById('setup-ui').style.display = 'block';
        document.getElementById('info-display').style.display = 'none';
        lastPos = null;
        map.invalidateSize();
    }
</script>
</body>
</html>
