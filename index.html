<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CL Live - Fixed Sync</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f8f9fa; overflow: hidden; height: 100vh; }
        #map { height: 60vh; width: 100%; background: #e9ecef; z-index: 1; }

        .app-container { padding: 15px; max-width: 500px; margin: auto; position: relative; z-index: 100; }
        .card { background: white; padding: 22px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: -60px; }

        /* ICON STYLES */
        .bubble-container { width: 70px; height: 95px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .map-speed-tag { background: #000; color: #fff; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 5px; margin-bottom: 3px; }

        .bubble-main { width: 50px; height: 50px; border: 4px solid #fff; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .bubble-arrow { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid #fff; margin-top: -2px; }
        
        /* DRIVER = GREEN SQUARE */
        .driver-bubble .bubble-main { border-color: #28a745; border-radius: 8px; } 
        .driver-bubble .bubble-arrow { border-top-color: #28a745; }
        
        /* PASSENGER = BLUE CIRCLE */
        .passenger-bubble .bubble-main { border-color: #007aff; border-radius: 50%; } 
        .passenger-bubble .bubble-arrow { border-top-color: #007aff; }

        .bubble-img { width: 70%; height: 70%; object-fit: contain; }
        .leaflet-marker-icon { transition: all 0.9s linear; }

        /* UI Elements */
        .role-selector { display: flex; gap: 8px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 15px; }
        .role-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: #777; }
        .role-btn.active { background: #007aff; color: white; }
        input, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 12px; }
        .action-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; color: white; font-weight: 800; background: linear-gradient(135deg, #007aff, #005bb5); cursor: pointer; }
        #info-display { display: none; text-align: center; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="app-container">
    <div class="card">
        <div id="setup-ui">
            <div class="role-selector">
                <button id="btn-driver" class="role-btn active" onclick="setRole('driver')">DRIVER</button>
                <button id="btn-passenger" class="role-btn" onclick="setRole('passenger')">PASSENGER</button>
            </div>
            <div id="driver-form">
                <input type="text" id="userName" placeholder="Driver Name">
                <select id="destination">
                    <option value="" disabled selected>Destination</option>
                    <option value="Apalit">Apalit Market</option>
                    <option value="SanFernando">SM Pampanga</option>
                </select>
                <select id="vehicle">
                    <option value="jeep">🚍 Jeepney</option>
                    <option value="bus">🚌 Provincial Bus</option>
                </select>
                <button class="action-btn" onclick="startSharing()">GO LIVE</button>
            </div>
            <div id="passenger-form" style="display:none;">
                <input type="text" id="passName" placeholder="Passenger Name">
                <button class="action-btn" onclick="startSharing()">FIND RIDES</button>
            </div>
        </div>

        <div id="info-display">
            <h3 id="display-name">---</h3>
            <p>Tracking Live Speed on Map...</p>
            <button class="action-btn" style="background:#f8f9fa; color:#444; border:1px solid #ddd;" onclick="stopSharing()">DISCONNECT</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAF957yq7BpNDOzQJpCqDkL-fhgBMywiY",
        databaseURL: "https://jeepney-tracker-33edd-default-rtdb.firebaseio.com",
        projectId: "jeepney-tracker-33edd",
        appId: "1:520991616016:web:475faf5308dc78ca5af53b" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const icons = { jeep: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png', bus: 'https://cdn-icons-png.flaticon.com/512/1039/1039845.png', user: 'https://cdn-icons-png.flaticon.com/512/1144/1144760.png' };
    var map = L.map('map', { zoomControl: false }).setView([14.9455, 120.7570], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let role = 'driver', markers = {}, watchId = null, myName = "";

    function setRole(r) {
        role = r;
        document.getElementById('btn-driver').classList.toggle('active', r === 'driver');
        document.getElementById('btn-passenger').classList.toggle('active', r === 'passenger');
        document.getElementById('driver-form').style.display = r === 'driver' ? 'block' : 'none';
        document.getElementById('passenger-form').style.display = r === 'passenger' ? 'block' : 'none';
    }

    function startSharing() {
        const input = role === 'driver' ? 'userName' : 'passName';
        myName = document.getElementById(input).value || "User_" + Math.floor(Math.random()*99);
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('info-display').style.display = 'block';
        setTimeout(() => map.invalidateSize(), 300);

        watchId = navigator.geolocation.watchPosition((pos) => {
            const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
            db.ref('cl_live/' + myName).set({
                name: myName, role, lat: pos.coords.latitude, lng: pos.coords.longitude, 
                speed, vehicle: role === 'driver' ? document.getElementById('vehicle').value : 'user',
                lastSeen: Date.now() // <--- ANTI-GHOST TIMESTAMP
            });
        }, null, { enableHighAccuracy: true });

        db.ref('cl_live').on('value', (snap) => {
            const data = snap.val();
            const now = Date.now();
            
            // CLEANING LOGIC: Remove users inactive for > 15 seconds
            for (let id in markers) {
                if (!data || !data[id] || (now - data[id].lastSeen > 15000)) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            }
            if (data) Object.values(data).forEach(u => {
                if (now - u.lastSeen < 15000) updateMarker(u);
            });
        });
    }

    function updateMarker(u) {
        const isDriver = u.role === 'driver';
        const bubbleClass = isDriver ? 'driver-bubble' : 'passenger-bubble';
        const iconImg = icons[u.vehicle] || icons.user;
        const html = `<div class="bubble-container ${bubbleClass}"><div class="map-speed-tag">${u.speed} km/h</div><div class="bubble-main"><img src="${iconImg}" class="bubble-img"></div><div class="bubble-arrow"></div></div>`;

        if (!markers[u.name]) {
            markers[u.name] = L.marker([u.lat, u.lng], { icon: L.divIcon({ className: '', html, iconSize: [70, 95], iconAnchor: [35, 95] }) }).addTo(map);
        } else {
            markers[u.name].setLatLng([u.lat, u.lng]);
            markers[u.name].setIcon(L.divIcon({ className: '', html, iconSize: [70, 95], iconAnchor: [35, 95] }));
        }
        if (u.name === myName) { map.panTo([u.lat, u.lng]); document.getElementById('display-name').innerText = u.name; }
    }

    function stopSharing() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (myName) db.ref('cl_live/' + myName).remove();
        db.ref('cl_live').off();
        for (let id in markers) map.removeLayer(markers[id]);
        markers = {};
        document.getElementById('setup-ui').style.display = 'block';
        document.getElementById('info-display').style.display = 'none';
    }
</script>
</body>
</html>
